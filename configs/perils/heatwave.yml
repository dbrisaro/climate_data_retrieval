# Peril: Heatwave
# Extreme heat events and positive temperature anomalies

peril: heatwave
description: "Extreme heat events and positive temperature anomalies"

sources:
  - source_type: era5
    dataset: reanalysis-era5-single-levels
    description: "Daily max temperature and 2 m temperature from ERA5 (0.25° resolution)"
    variables:
      - 2m_temperature
      - maximum_2m_temperature_since_previous_post_processing
    hours:
      - "06"
      - "18"
    levels: null
